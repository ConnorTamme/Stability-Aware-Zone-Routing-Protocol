# =============================================================================
# FANET Scenario 3: Controlled Stress Test (2D Random Waypoint)
# -----------------------------------------------------------------------------
# Area:       1000 x 1000 m (2D -- z stays at 0)
# Mobility:   BonnMotion Random Waypoint 2D, pauseTime = 0
#             (/home/mint/traces/bonnmotion/stress_n<N>_s<S>_seed<R>.movements)
# Traffic:    5 fixed UAV->UAV pairs: uav[0..4] -> uav[5..9]
#             (nodes >= 10 are routing-only forwarders)
# Sweeps:     numNodes in {10,30,50} @ 30 m/s   and   maxSpeed in {10,30,50} @ 30 nodes
# Protocols:  StabilityZrp, Zrp-k1, Zrp-k2, Zrp-k3, Aodv, Dsdv
# Repeat:     10 seeds per (protocol, sweep-point)
# =============================================================================

[General]
network = FanetStressNetwork
sim-time-limit = 500s
warmup-period = 100s
repeat = 10

# ---------------------------------------------------------------------------
# Routing / ARP
# ---------------------------------------------------------------------------
*.configurator.addStaticRoutes = false
**.netmaskRoutes = ""
**.arp.typename = "GlobalArp"
**.forwarding = true

# This INET build has no OSG runtime -- disable the OSG visualizer path.
*.visualizer.osgVisualizer.typename = ""

# ---------------------------------------------------------------------------
# MAC
# ---------------------------------------------------------------------------
*.uav[*].wlan[0].opMode = "g(mixed)"
**.wlan[*].bitrate = 24Mbps

# ---------------------------------------------------------------------------
# Propagation: Friis free-space, ~500 m range (derivation in FanetRecon ini).
# ---------------------------------------------------------------------------
*.radioMedium.pathLoss.typename = "FreeSpacePathLoss"
**.transmitter.power = 8mW
**.receiver.sensitivity = -85dBm
**.displayCommunicationRanges = true

# ---------------------------------------------------------------------------
# Constraint area (2D -- Z band collapsed to zero).
# ---------------------------------------------------------------------------
**.constraintAreaMinX = 0m
**.constraintAreaMinY = 0m
**.constraintAreaMinZ = 0m
**.constraintAreaMaxX = 1050m #Room for error
**.constraintAreaMaxY = 1050m
**.constraintAreaMaxZ = 0m

# ---------------------------------------------------------------------------
# Mobility: pure 2D BonnMotion traces
# ---------------------------------------------------------------------------
*.uav[*].mobility.typename = "BonnMotionMobility"
*.uav[*].mobility.is3D = false
*.uav[*].mobility.nodeId = -1

# ---------------------------------------------------------------------------
# Statistics recording
#   Rely on each @statistic's declared recording modes. A blanket `+vector`
#   crashes: packet-typed signals like packetSent cannot be coerced to double.
# ---------------------------------------------------------------------------
**.scalar-recording = true
**.vector-recording = true
# TODO: add custom signal for route rediscovery count (ZRP / AODV / DSDV)

# =============================================================================
# Traffic templates -- split into two halves because uav[0..4] and uav[5..9]
# play different roles, and uav[10..] forward only. Each protocol config picks
# the right numApps / typename / app index layout.
# =============================================================================

[Config StressBase]
description = "Scenario 3 base: 5 source/sink pairs + forwarders"
# Sources (uav[0..4]) -- app[0] = UdpBasicApp
*.uav[0..4].app[0].typename = "UdpBasicApp"
*.uav[0..4].app[0].destPort = 5000
*.uav[0..4].app[0].messageLength = 512B
*.uav[0..4].app[0].sendInterval = 0.25s
*.uav[0..4].app[0].startTime = uniform(100s, 101s)
*.uav[0].app[0].destAddresses = "uav[5]"
*.uav[1].app[0].destAddresses = "uav[6]"
*.uav[2].app[0].destAddresses = "uav[7]"
*.uav[3].app[0].destAddresses = "uav[8]"
*.uav[4].app[0].destAddresses = "uav[9]"

# Sinks (uav[5..9]) -- app[0] = UdpSink
*.uav[5..9].app[0].typename = "UdpSink"
*.uav[5..9].app[0].localPort = 5000

# Default ZRP tuning (only binds where ZRP actually lives)
**.app[*].zoneRadius = 2
**.app[*].NDP_helloInterval = 1s
**.app[*].IARP_updateInterval = 1s
**.app[*].linkStateLifetime = 3s

# =============================================================================
# Sweep bases
# =============================================================================
[Config StressNodeSweep]
extends = StressBase
description = "Node-count sweep @ 30 m/s"
*.numUavs = ${numNodes=10,30,50}
*.uav[*].mobility.traceFile = "/home/mint/traces/bonnmotion/stress_n${numNodes}_s30_seed${repetition}.movements"

[Config StressSpeedSweep]
extends = StressBase
description = "Speed sweep @ 30 nodes"
*.numUavs = 30
*.uav[*].mobility.traceFile = "/home/mint/traces/bonnmotion/stress_n30_s${maxSpeed=10,30,50}_seed${repetition}.movements"

# =============================================================================
# Protocol leaf configs
# -----------------------------------------------------------------------------
# ZRP: every UAV runs ZRP as a routing app. Pairs carry UdpBasicApp/UdpSink at
# app[0] plus ZRP at app[1] (numApps=2); forwarders carry only ZRP at app[0]
# (numApps=1).
#
# AODV / DSDV: routing is provided by the node type (AodvRouter / DsdvRouter).
# Pairs keep numApps=1 (traffic app); forwarders get numApps=0.
# =============================================================================

# ----- StabilityZRP (PLACEHOLDER) ------------------------------------------
[Config Stress_NodeSweep_StabilityZrp]
extends = StressNodeSweep
description = "StabilityZRP (PLACEHOLDER = ZRP k=2) -- node sweep"
# PLACEHOLDER: StabilityZRP uses same ZRP module with k=2 until stability-based zone logic is implemented
*.uav[*].typename = "AdhocHost"
*.uav[0..9].numApps = 2
*.uav[0..9].app[1].typename = "sa_zrp.Zrp"
*.uav[10..].numApps = 1
*.uav[10..].app[0].typename = "sa_zrp.Zrp"
**.app[*].zoneRadius = 2

[Config Stress_SpeedSweep_StabilityZrp]
extends = StressSpeedSweep
description = "StabilityZRP (PLACEHOLDER = ZRP k=2) -- speed sweep"
# PLACEHOLDER: StabilityZRP uses same ZRP module with k=2 until stability-based zone logic is implemented
*.uav[*].typename = "AdhocHost"
*.uav[0..9].numApps = 2
*.uav[0..9].app[1].typename = "sa_zrp.Zrp"
*.uav[10..].numApps = 1
*.uav[10..].app[0].typename = "sa_zrp.Zrp"
**.app[*].zoneRadius = 2

