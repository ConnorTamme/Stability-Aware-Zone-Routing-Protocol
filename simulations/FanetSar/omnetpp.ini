# =============================================================================
# FANET Scenario 2: Search and Rescue (3D RPGM)
# -----------------------------------------------------------------------------
# Area:       1500 x 3000 x 50 m
# Mobility:   BonnMotion RPGM traces, 3 groups, r=100m, c=0.0
#             (/home/mint/traces/bonnmotion/sar_n<N>_s<S>_seed<R>.movements)
# Traffic:    All-to-one CBR -> groundStation at the edge (0, 1500, 0)
# Sweeps:     numNodes in {10,30,50} @ 30 m/s   and   maxSpeed in {10,30,50} @ 30 nodes
# Protocols:  StabilityZrp, Zrp-k1, Zrp-k2, Zrp-k3, Aodv, Dsdv
# Repeat:     10 seeds per (protocol, sweep-point)
# =============================================================================

[General]
network = FanetSarNetwork
sim-time-limit = 500s
warmup-period = 100s
repeat = 10

# ---------------------------------------------------------------------------
# Routing / ARP
# ---------------------------------------------------------------------------
*.configurator.addStaticRoutes = false
**.netmaskRoutes = ""
**.arp.typename = "GlobalArp"
**.forwarding = true

# This INET build has no OSG runtime -- disable the OSG visualizer path.
*.visualizer.osgVisualizer.typename = ""

# ---------------------------------------------------------------------------
# MAC
# ---------------------------------------------------------------------------
*.uav[*].wlan[0].opMode = "g(mixed)"
*.groundStation.wlan[0].opMode = "g(mixed)"
**.wlan[*].bitrate = 24Mbps

# ---------------------------------------------------------------------------
# Propagation: Friis free-space, ~500 m range (see FanetRecon/omnetpp.ini for
# the derivation: 94 dB path loss @ 500 m, 2.4 GHz; 8 mW TX, -85 dBm Rx).
# ---------------------------------------------------------------------------
*.radioMedium.pathLoss.typename = "FreeSpacePathLoss"
**.transmitter.power = 8mW
**.receiver.sensitivity = -85dBm
**.displayCommunicationRanges = true

# ---------------------------------------------------------------------------
# Constraint area (3D, thin 50 m altitude band)
# ---------------------------------------------------------------------------
**.constraintAreaMinX = 0m
**.constraintAreaMinY = 0m
**.constraintAreaMinZ = 0m
**.constraintAreaMaxX = 1550m #Room for error
**.constraintAreaMaxY = 3050m
**.constraintAreaMaxZ = 60m

# ---------------------------------------------------------------------------
# Mobility
#   RPGM was generated in BonnMotion with a thin -z 50 altitude band.
#   is3D = true should work; if altitudes look wrong at runtime (RPGM is
#   natively 2D), flip is3D to false here and assign fixed altitude bands per
#   group in the .ini.
# ---------------------------------------------------------------------------
*.uav[*].mobility.typename = "BonnMotionMobility"
*.uav[*].mobility.is3D = true
# Traces were generated by BonnMotion and start with a `#3D` comment header
# that INET's parser does not skip; line 0 is empty, so shift nodeId by +1.
*.uav[*].mobility.nodeId = parent.index + 1

*.groundStation.mobility.typename = "StationaryMobility"
*.groundStation.mobility.initialX = 0m
*.groundStation.mobility.initialY = 1500m
*.groundStation.mobility.initialZ = 0m

# ---------------------------------------------------------------------------
# Statistics recording
#   Rely on each @statistic's declared recording modes. A blanket `+vector`
#   crashes: packet-typed signals like packetSent cannot be coerced to double.
# ---------------------------------------------------------------------------
**.scalar-recording = true
**.vector-recording = true
# TODO: add custom signal for route rediscovery count (ZRP / AODV / DSDV)

# =============================================================================
# Scenario-wide base: all-to-one traffic template
# =============================================================================
[Config SarBase]
description = "Scenario 2 base: all-to-one CBR to groundStation"
*.uav[*].app[0].typename = "UdpBasicApp"
*.uav[*].app[0].destAddresses = "groundStation"
*.uav[*].app[0].destPort = 5000
*.uav[*].app[0].messageLength = 512B
*.uav[*].app[0].sendInterval = 0.25s
*.uav[*].app[0].startTime = uniform(100s, 101s)

*.groundStation.app[0].typename = "UdpSink"
*.groundStation.app[0].localPort = 5000

**.app[*].zoneRadius = 2
**.app[*].NDP_helloInterval = 1s
**.app[*].IARP_updateInterval = 1s
**.app[*].linkStateLifetime = 3s

# =============================================================================
# Sweep bases
# =============================================================================
[Config SarNodeSweep]
extends = SarBase
description = "Node-count sweep @ 30 m/s"
*.numUavs = ${numNodes=10,30,50}
*.uav[*].mobility.traceFile = "/home/mint/traces/bonnmotion/sar_n${numNodes}_s30_seed${repetition}.movements"

[Config SarSpeedSweep]
extends = SarBase
description = "Speed sweep @ 30 nodes"
*.numUavs = 30
*.uav[*].mobility.traceFile = "/home/mint/traces/bonnmotion/sar_n30_s${maxSpeed=10,30,50}_seed${repetition}.movements"

# =============================================================================
# Protocol leaf configs
# =============================================================================

# ----- StabilityZRP (PLACEHOLDER) ------------------------------------------
[Config Sar_NodeSweep_StabilityZrp]
extends = SarNodeSweep
description = "StabilityZRP (PLACEHOLDER = ZRP k=2) -- node sweep"
# PLACEHOLDER: StabilityZRP uses same ZRP module with k=2 until stability-based zone logic is implemented
*.uav[*].typename = "AdhocHost"
*.uav[*].numApps = 2
*.uav[*].app[1].typename = "sa_zrp.Zrp"
*.groundStation.typename = "AdhocHost"
*.groundStation.numApps = 2
*.groundStation.app[1].typename = "sa_zrp.Zrp"
**.app[*].zoneRadius = 2

[Config Sar_SpeedSweep_StabilityZrp]
extends = SarSpeedSweep
description = "StabilityZRP (PLACEHOLDER = ZRP k=2) -- speed sweep"
