# =============================================================================
# FANET Scenario 1: Reconnaissance (3D Gauss-Markov)
# -----------------------------------------------------------------------------
# Area:       3600 x 1200 x 200 m
# Mobility:   BonnMotion Gauss-Markov traces (pre-generated under
#             ../Traces/bonnmotion/recon_n<N>_s<S>_seed<R>.movements)
# Traffic:    All-to-one CBR -> groundStation
# Sweeps:     numNodes in {10,30,50} @ 30 m/s   and   maxSpeed in {10,30,50} @ 30 nodes
# Protocols:  StabilityZrp, Zrp-k1, Zrp-k2, Zrp-k3, Aodv, Olsr   (6 per sweep)
# Repeat:     10 seeds per (protocol, sweep-point)
# =============================================================================

[General]
network = FanetReconNetwork
sim-time-limit = 500s
warmup-period = 100s
repeat = 10

# ---------------------------------------------------------------------------
# Routing / ARP
# ---------------------------------------------------------------------------
*.configurator.addStaticRoutes = false
**.netmaskRoutes = ""
**.arp.typename = "GlobalArp"
**.forwarding = true

# This INET build has no OSG runtime -- disable the OSG visualizer path.
*.visualizer.osgVisualizer.typename = ""

# ---------------------------------------------------------------------------
# MAC: IEEE 802.11g ad-hoc mode
# ---------------------------------------------------------------------------
*.uav[*].wlan[0].opMode = "g(mixed)"
*.groundStation.wlan[0].opMode = "g(mixed)"
**.wlan[*].bitrate = 24Mbps

# ---------------------------------------------------------------------------
# Propagation: Friis free-space at 2.4 GHz, calibrated for ~500 m range.
#   PL(500 m) = 20*log10(4*pi*500 / 0.125) ≈ 94 dB
#   With sensitivity = -85 dBm, TX power must be ≈ 94 - 85 = 9 dBm ≈ 8 mW.
# ---------------------------------------------------------------------------
*.radioMedium.pathLoss.typename = "FreeSpacePathLoss"
**.transmitter.power = 8mW
**.receiver.sensitivity = -85dBm
**.displayCommunicationRanges = true

# ---------------------------------------------------------------------------
# Constraint area (3D).
# The traces were generated with a 3600 x 1200 x 50 m bounding box (see the
# .params sidecars); INET rejects positions outside the constraint area, so
# bounds must match the trace generation extents, not the nominal 3600x1200.
# ---------------------------------------------------------------------------
**.constraintAreaMinX = 0m
**.constraintAreaMinY = 0m
**.constraintAreaMinZ = 0m
**.constraintAreaMaxX = 3650m #Add room for error
**.constraintAreaMaxY = 1250m
**.constraintAreaMaxZ = 60m

# ---------------------------------------------------------------------------
# Mobility: UAVs replay BonnMotion traces; ground station is stationary.
#   nodeId = -1 makes each uav[i] pick up line i of the trace.
#   traceFile is bound per-config so the path stays fixed across protocols.
# ---------------------------------------------------------------------------
*.uav[*].mobility.typename = "BonnMotionMobility"
*.uav[*].mobility.is3D = true
# Traces were generated by BonnMotion and start with a `#3D` comment header
# that INET's parser does not skip; line 0 is empty, so shift nodeId by +1.
*.uav[*].mobility.nodeId = parent.index + 1

*.groundStation.mobility.typename = "StationaryMobility"
*.groundStation.mobility.initialX = 1800m
*.groundStation.mobility.initialY = 600m
*.groundStation.mobility.initialZ = 0m

# ---------------------------------------------------------------------------
# Statistics recording
#   Rely on each @statistic's declared recording modes (INET's UdpSink already
#   emits endToEndDelay as histogram+vector, UdpBasicApp emits packetSent as
#   scalar counts, etc.). A blanket `+vector` here would crash: packet-typed
#   signals cannot be coerced to a double by the vector recorder.
# ---------------------------------------------------------------------------
**.scalar-recording = true
**.vector-recording = true
# ZRP emits its own @signal/@statistic declarations internally -- no toggle.
# TODO: add custom signal for route rediscovery count (ZRP / AODV / OLSR)

# =============================================================================
# Scenario-wide base: all-to-one traffic template (ZRP slot left abstract)
# Each protocol config below sets numApps / typename appropriately.
# =============================================================================
[Config ReconBase]
description = "Scenario 1 base: all-to-one CBR to groundStation"
# UAV traffic app defaults (the routing app at index 1 is added per protocol)
*.uav[*].app[0].typename = "UdpBasicApp"
*.uav[*].app[0].destAddresses = "groundStation"
*.uav[*].app[0].destPort = 5000
*.uav[*].app[0].messageLength = 512B
*.uav[*].app[0].sendInterval = 0.25s
*.uav[*].app[0].startTime = uniform(100s, 101s)

# Ground station sink
*.groundStation.app[0].typename = "UdpSink"
*.groundStation.app[0].localPort = 5000

# Default ZRP parameters (only bind to ZRP slots; non-ZRP apps ignore them).
**.app[*].zoneRadius = 2
**.app[*].NDP_helloInterval = 1s
**.app[*].IARP_updateInterval = 1s
**.app[*].linkStateLifetime = 3s

# =============================================================================
# Sweep bases (pick exactly one axis per run)
# =============================================================================
[Config ReconNodeSweep]
extends = ReconBase
description = "Node-count sweep @ 30 m/s"
*.numUavs = ${numNodes=10,30,50}
*.uav[*].mobility.traceFile = "../Traces/bonnmotion/recon_n${numNodes}_s30_seed${repetition}.movements"

[Config ReconSpeedSweep]
extends = ReconBase
description = "Speed sweep @ 30 nodes"
*.numUavs = 30
*.uav[*].mobility.traceFile = "../Traces/bonnmotion/recon_n30_s${maxSpeed=10,30,50}_seed${repetition}.movements"

# =============================================================================
# Protocol configs -- 6 protocols x 2 sweeps = 12 leaf configs
# -----------------------------------------------------------------------------
# ZRP install pattern: AdhocHost with numApps=2 (UdpBasicApp + sa_zrp.Zrp).
# AODV: switch uav typename to AodvRouter, numApps=1.
# OLSR: keep AdhocHost with numApps=2, install inet.routing.extras.Olsr at app[1].
# Ground station mirrors UAV host type so it participates in routing.
# =============================================================================

# ----- StabilityZRP (PLACEHOLDER: same module as Zrp-k2 until the stability-
#       based zone logic lands in src/Zrp.cc) ---------------------------------
[Config Recon_NodeSweep_StabilityZrp]
extends = ReconNodeSweep
description = "StabilityZRP (PLACEHOLDER = ZRP k=2) -- node sweep"
# PLACEHOLDER: StabilityZRP uses same ZRP module with k=2 until stability-based zone logic is implemented
*.uav[*].typename = "AdhocHost"
*.uav[*].numApps = 2
*.uav[*].app[1].typename = "sa_zrp.Zrp"
*.groundStation.typename = "AdhocHost"
*.groundStation.numApps = 2
*.groundStation.app[1].typename = "sa_zrp.Zrp"
**.app[*].zoneRadius = 2

[Config Recon_SpeedSweep_StabilityZrp]
extends = ReconSpeedSweep
description = "StabilityZRP (PLACEHOLDER = ZRP k=2) -- speed sweep"
# PLACEHOLDER: StabilityZRP uses same ZRP module with k=2 until stability-based zone logic is implemented
*.uav[*].typename = "AdhocHost"
*.uav[*].numApps = 2
*.uav[*].app[1].typename = "sa_zrp.Zrp"
*.groundStation.typename = "AdhocHost"
*.groundStation.numApps = 2
*.groundStation.app[1].typename = "sa_zrp.Zrp"
**.app[*].zoneRadius = 2

