# ----- OLSR (proactive, from inetmanet-4.x) ---------------------------------
# inet.routing.extras.Olsr is an IApp, so we install it as an app slot on
# AdhocHost (same shape as ZRP) rather than via a dedicated *Router node type.
[Config Recon_NodeSweep_Olsr]
extends = ReconNodeSweep
description = "OLSR -- node sweep"
*.uav[*].typename = "AdhocHost"
*.uav[*].numApps = 2
*.uav[*].app[1].typename = "inet.routing.extras.Olsr"
*.groundStation.typename = "AdhocHost"
